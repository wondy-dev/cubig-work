name: Daily Dashboard Data Collection

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install googleapis google-ads-api

      - name: Write Google credentials from secrets
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > google_credentials.json
          echo '${{ secrets.GOOGLE_TOKEN }}' > drive_token.json

      - name: Create output directory
        run: mkdir -p outputs/dashboard

      - name: Collect dashboard data (365 days)
        env:
          NAVER_ADS_API_KEY: ${{ secrets.NAVER_ADS_API_KEY }}
          NAVER_ADS_SECRET_KEY: ${{ secrets.NAVER_ADS_SECRET_KEY }}
          NAVER_ADS_CUSTOMER_ID: ${{ secrets.NAVER_ADS_CUSTOMER_ID }}
          META_ADS_ACCESS_TOKEN: ${{ secrets.META_ADS_ACCESS_TOKEN }}
          META_ADS_ACCOUNT_ID: ${{ secrets.META_ADS_ACCOUNT_ID }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_ADS_MCC_ID: ${{ secrets.GOOGLE_ADS_MCC_ID }}
        run: node collect-all.js --period 365

      - name: Copy data to root for build
        run: cp outputs/dashboard/data.json ./data.json

      - name: Build encrypted dashboard
        env:
          STATICRYPT_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          npm install -g staticrypt
          node build-encrypted.js
          npx staticrypt combined.html -p "$STATICRYPT_PASSWORD" --short -d . \
            --template-title "CUBIG Marketing Dashboard" \
            --template-instructions "대시보드에 접근하려면 비밀번호를 입력하세요." \
            --template-button "로그인" \
            --template-placeholder "비밀번호" \
            --template-error "비밀번호가 올바르지 않습니다." \
            --remember 30 \
            --template-remember "30일간 기억하기"
          mv combined.html index.html
          rm -f data.json

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git rm --cached data.json --ignore-unmatch
          if git diff --cached --quiet; then
            echo "No data changes detected"
          else
            git commit -m "chore: daily encrypted dashboard update $(date -u +%Y-%m-%d)"
            git push
          fi
