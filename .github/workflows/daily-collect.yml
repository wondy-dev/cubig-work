name: Daily Dashboard Data Collection

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install googleapis
      - name: Write Google credentials
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > google_credentials.json
          echo '${{ secrets.GOOGLE_TOKEN }}' > drive_token.json
      - run: mkdir -p outputs/dashboard
      - name: Collect data
        env:
          NAVER_ADS_API_KEY: ${{ secrets.NAVER_ADS_API_KEY }}
          NAVER_ADS_SECRET_KEY: ${{ secrets.NAVER_ADS_SECRET_KEY }}
          NAVER_ADS_CUSTOMER_ID: ${{ secrets.NAVER_ADS_CUSTOMER_ID }}
          META_ADS_ACCESS_TOKEN: ${{ secrets.META_ADS_ACCESS_TOKEN }}
          META_ADS_ACCOUNT_ID: ${{ secrets.META_ADS_ACCOUNT_ID }}
        run: node collect-all.js --period 365
      - run: cp outputs/dashboard/data.json ./data.json
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"
            git push
          fi
